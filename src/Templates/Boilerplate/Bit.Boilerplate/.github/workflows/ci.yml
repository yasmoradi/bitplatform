name: Boilerplate CI

# https://bitplatform.dev/templates/dev-ops

on:
  workflow_dispatch:
  pull_request:

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true

permissions:
  contents: read

jobs:

  build_and_test:
    name: build and test
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          persist-credentials: false

    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        global-json-file: global.json

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24

    - name: Workload restore
      run: dotnet workload restore

    - name: Build
      run: dotnet build Boilerplate.slnx

    - name: Install Playwright
      run: pwsh src/Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps

    - name: Trust dotnet cert
      continue-on-error: true
      run: dotnet dev-certs https --trust # Necessary for aspire related resources

    - name: Test
      id: test
      run: cd src/Tests && dotnet test

    - name: Upload Tests Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ failure() && steps.test.conclusion == 'failure' }}
      with:
        name: tests-artifact
        path: ./src/Tests/TestResults
        retention-days: 14
