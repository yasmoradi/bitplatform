name: bit platform CI - Bmotion

on:
  workflow_dispatch:
  pull_request:
    paths:
    - 'src/Bmotion/**'

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true

permissions:
  contents: read

jobs:
  build-Bmotion:
    if: startsWith(github.event.pull_request.title, 'Prerelease') != true && startsWith(github.event.pull_request.title, 'Release') != true && startsWith(github.event.pull_request.title, 'Version') != true
    name: build Bit.Bmotion
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          persist-credentials: false

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        global-json-file: src/global.json

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: 9.0.x

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: 8.0.x

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24

    - name: dotnet workload restore
      run:  cd src/Bmotion && dotnet workload restore

    - name: InstallNodejsDependencies
      continue-on-error: true # Error MSB4057, not all csproj files have InstallNodejsDependencies target.
      run: dotnet build src/Bmotion/Bit.Bmotion.slnx -t:InstallNodejsDependencies -m:1 -f net10.0

    - name: dotnet build
      run: dotnet build src/Bmotion/Bit.Bmotion.slnx

    - name: dotnet test (C# engine + component tests)
      # Run from inside src so src/global.json's "test" runner setting applies
      # (from the repo root the SDK falls back to the unsupported VSTest path).
      run: cd src/Bmotion && dotnet test Tests/Bit.Bmotion.Tests/Bit.Bmotion.Tests.csproj -f net10.0

    - name: JS tests (bit-bmotion.js drag/scroll math)
      run: |
        cd src/Bmotion/Tests/bit-bmotion-js
        npm ci || npm install
        npm test
